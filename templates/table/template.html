<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>CSV Report</title>
    <style>
      :root {
        --text: #1f1f1f;
        --border: #cfcfcf;
        --header: #f0f0f0;
        --stripe: #fafafa;
      }
      body {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-size: 12px;
        color: var(--text);
        margin: 24px;
      }
      h1 {
        font-size: 18px;
        margin: 0 0 8px 0;
      }
      .meta {
        color: #555;
        margin-bottom: 16px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        border: 1px solid var(--border);
        padding: 6px 8px;
        text-align: left;
        vertical-align: top;
      }
      th {
        background: var(--header);
      }
      tbody tr:nth-child(even) td {
        background: var(--stripe);
      }
      .footer {
        margin-top: 16px;
        color: #777;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <h1>CSV Report</h1>
    <div class="meta">
      Source: {{ meta.source }} · Rows: {{ meta.count }}
    </div>

    {% if columns and rows %}
      <table>
        <thead>
          <tr>
            {% for column in columns %}
              <th>{{ column }}</th>
            {% endfor %}
          </tr>
        </thead>
        <tbody>
          {% for row in rows %}
            <tr>
              {% for column in columns %}
                <td>{{ row[column] }}</td>
              {% endfor %}
            </tr>
          {% endfor %}
        </tbody>
      </table>
    {% else %}
      <p>No data.</p>
    {% endif %}

    <div class="footer">Generated by reportgen</div>
  </body>
</html>
